<!DOCTYPE html>
<html>

<head>
    <title>RGB Match</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="script.js" defer></script>
</head>

<body>

    <h2>Match the Colour</h2>

    <div class="box1">

        <p>Target :</p>
        <div id="target" class="box"></div>

        <p>Your Colour :</p>
        <div id="user" class="box"></div>

        <div class="slider-row">
            <label>Red</label>
            <input type="range" min="0" max="255" id="r">
        </div>

        <div class="slider-row">
            <label>Green</label>
            <input type="range" min="0" max="255" id="g">
        </div>

        <div class="slider-row">
            <label>Blue</label>
            <input type="range" min="0" max="255" id="b">
        </div>

        <h3>Accuracy: <span id="acc">0%</span></h3>

    </div>
</body>

</html>
